<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Phase Vuln Coach</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						phase: {
							bg: '#010101',
							section: '#030304',
							section2: '#070709',
							line: 'rgba(255,255,255,0.06)',
							panel: 'rgba(255,255,255,0.03)',
							panelStrong: 'rgba(255,255,255,0.06)',
							title: '#d8dbe0',
							body: '#c4c9d1',
							sub: '#9fa6b0',
							soft: '#777f8a'
						}
					},
					fontFamily: {
						sans: ['Pretendard', 'Noto Sans KR', 'Arial', 'sans-serif']
					},
					boxShadow: {
						phase: '0 24px 60px rgba(0, 0, 0, 0.55)',
						glow: '0 0 0 1px rgba(255,255,255,0.03), 0 18px 48px rgba(0,0,0,0.45)'
					},
					backdropBlur: {
						xs: '2px'
					}
				}
			}
		};
	</script>
	<style>
		@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

		html {
			color-scheme: dark;
			scroll-behavior: smooth;
		}

		body {
			min-height: 100vh;
			word-break: keep-all;
			background:
				radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 18%),
				radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.04), transparent 26%),
				linear-gradient(to bottom, #000000, #020203 36%, #050507 70%, #08080a 100%);
		}

		.auth-shell::before,
		.auth-shell::after {
			content: '';
			position: absolute;
			inset: auto;
			border-radius: 9999px;
			pointer-events: none;
			filter: blur(60px);
			opacity: 0.35;
		}

		.auth-shell::before {
			top: 8%;
			left: 50%;
			width: 18rem;
			height: 18rem;
			transform: translateX(-50%);
			background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 68%);
		}

		.auth-shell::after {
			right: 8%;
			bottom: 10%;
			width: 14rem;
			height: 14rem;
			background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 72%);
		}

		.field-ring {
			transition:
				border-color 0.2s ease,
				background-color 0.2s ease,
				box-shadow 0.2s ease,
				transform 0.2s ease;
		}

		.field-ring:focus-within {
			border-color: rgba(255,255,255,0.16);
			background-color: rgba(255,255,255,0.055);
			box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
			transform: translateY(-1px);
		}

		.hidden-panel {
			display: none;
		}

		.auth-panel.hidden-panel {
			display: none;
		}

		.auth-card {
			min-height: 840px;
		}

		.auth-panel {
			display: flex;
			min-height: 372px;
			flex-direction: column;
		}

		.auth-fields {
			display: flex;
			min-height: 360px;
			flex-direction: column;
			gap: 1rem;
		}

		.auth-field-note {
			min-height: 20px;
		}

		.auth-actions {
			margin-top: auto;
		}

		.auth-spacer {
			visibility: hidden;
			pointer-events: none;
		}

		.feedback-toast {
			position: fixed;
			top: 20px;
			right: 20px;
			z-index: 60;
			width: min(calc(100vw - 32px), 360px);
			transform: translate3d(0, -10px, 0);
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s ease, transform 0.2s ease;
		}

		.feedback-toast.is-visible {
			opacity: 1;
			transform: translate3d(0, 0, 0);
		}

		@media (max-width: 640px) {
			.auth-card {
				min-height: 840px;
			}

			.auth-panel {
				min-height: 388px;
			}

			.auth-fields {
				min-height: 372px;
			}

			.feedback-toast {
				top: 12px;
				right: 12px;
				width: min(calc(100vw - 24px), 360px);
			}
		}
	</style>
</head>
<body class="font-sans text-phase-body antialiased">
	<div id="form-feedback" class="feedback-toast rounded-2xl border px-4 py-3 text-sm leading-6 shadow-phase backdrop-blur-xl" aria-live="polite"></div>

	<div class="auth-shell relative isolate flex min-h-screen items-center justify-center overflow-hidden px-5 py-10 sm:px-6 lg:px-8">
		<div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:72px_72px] opacity-[0.06]"></div>

		<main class="auth-card relative z-10 w-full max-w-md rounded-[28px] border border-phase-line bg-white/5 p-5 shadow-phase backdrop-blur-xl sm:p-7">
			<div class="flex h-full flex-col space-y-6">
				<div class="space-y-4 text-center">
					<a href="../Main-page/index.html" class="inline-flex items-center gap-3 text-sm font-semibold text-phase-sub transition hover:text-phase-title focus:outline-none focus-visible:text-phase-title" aria-label="메인 페이지로 이동">
						<span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-phase-title shadow-glow">P</span>
						<span class="tracking-[0.24em] text-phase-soft">PHASE VULN COACH</span>
					</a>

					<div class="inline-flex w-full rounded-2xl border border-white/10 bg-white/[0.03] p-1" role="tablist" aria-label="인증 화면 전환">
						<button
							type="button"
							id="signin-tab"
							data-target="signin"
							class="auth-tab flex-1 rounded-xl px-4 py-3 text-sm font-semibold transition duration-200"
							role="tab"
							aria-controls="signin-panel"
							aria-selected="true"

							로그인
						</button>
						<button
							type="button"
							id="signup-tab"

							class="auth-tab flex-1 rounded-xl px-4 py-3 text-sm font-semibold text-phase-sub transition duration-200"
							role="tab"
							aria-controls="signup-panel"
							aria-selected="false"
						>
							회원가입
						</button>
					</div>

					<div>
						<h1 id="form-title" class="text-3xl font-bold tracking-[-0.04em] text-phase-title">로그인</h1>
						<p id="form-subtitle" class="mt-2 text-sm leading-6 text-phase-sub">이메일 또는 GitHub 계정으로 계속하세요.</p>
					</div>
				</div>

				<div class="space-y-3">
					<button id="github-auth-button" type="button" class="flex w-full items-center justify-center gap-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3.5 text-sm font-semibold text-phase-title transition duration-300 hover:-translate-y-0.5 hover:bg-white/[0.06] focus:outline-none focus-visible:ring-4 focus-visible:ring-white/10">
						<svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5 fill-current">
							<path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.27-.01-1.18-.02-2.14-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.67 1.24 3.32.95.1-.74.4-1.24.72-1.52-2.56-.29-5.26-1.28-5.26-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.86 10.86 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.59.23 2.77.11 3.06.73.81 1.18 1.84 1.18 3.1 0 4.42-2.7 5.39-5.28 5.68.41.35.78 1.04.78 2.11 0 1.52-.01 2.75-.01 3.12 0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" />
						</svg>
						<span id="github-button-label">GitHub로 계속하기</span>
					</button>

					<div class="flex items-center gap-3 text-xs uppercase tracking-[0.24em] text-phase-soft">
						<span class="h-px flex-1 bg-white/10"></span>
						또는
						<span class="h-px flex-1 bg-white/10"></span>
					</div>
				</div>

				<form id="signin-panel" class="auth-panel space-y-4" novalidate aria-labelledby="form-title">
							<div class="auth-fields">
							<div class="space-y-2">
								<label for="signin-email" class="text-sm font-medium text-phase-title">이메일</label>
								<div class="field-ring rounded-2xl border border-white/10 bg-white/[0.03]">
									<input
										id="signin-email"
										name="email"
										type="email"
										autocomplete="email"
										class="w-full rounded-2xl bg-transparent px-4 py-3.5 text-sm text-phase-title placeholder:text-phase-soft focus:outline-none"
										placeholder="you@example.com"
										aria-describedby="signin-email-hint"
										required
									/>
								</div>
									<p id="signin-email-hint" class="auth-field-note text-xs text-phase-soft">가입한 이메일 주소를 입력하세요.</p>
							</div>

							<div class="space-y-2">
								<label for="signin-password" class="text-sm font-medium text-phase-title">비밀번호</label>
								<div class="field-ring rounded-2xl border border-white/10 bg-white/[0.03]">
									<input
										id="signin-password"
										name="password"
										type="password"
										autocomplete="current-password"
										class="w-full rounded-2xl bg-transparent px-4 py-3.5 text-sm text-phase-title placeholder:text-phase-soft focus:outline-none"

									<p class="auth-field-note auth-spacer text-xs text-phase-soft" aria-hidden="true">보안을 위해 8자 이상, 영문과 숫자를 함께 사용하세요.</p>
							</div>

							<div class="auth-spacer space-y-2" aria-hidden="true">
									<label class="text-sm font-medium text-phase-title">비밀번호 확인</label>
									<div class="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3.5 text-sm text-phase-soft">비밀번호를 한 번 더 입력하세요</div>
									<p class="auth-field-note text-xs text-phase-soft">.</p>
							</div>
								</div>

							<div class="auth-actions space-y-4">
								<button type="submit" class="w-full rounded-2xl border border-white/15 bg-white/90 px-4 py-3.5 text-sm font-semibold text-black transition duration-300 hover:-translate-y-0.5 hover:bg-white focus:outline-none focus-visible:ring-4 focus-visible:ring-white/20">
									로그인
								</button>

								<p class="text-center text-sm text-phase-sub">
									아직 계정이 없나요?
									<a href="#signup" class="font-semibold text-phase-title transition hover:text-white focus:outline-none" data-switch="signup">회원가입으로 이동</a>
								</p>
							</div>
						</form>

				<form id="signup-panel" class="auth-panel hidden-panel space-y-4" novalidate aria-labelledby="form-title">
							<div class="auth-fields">
							<div class="space-y-2">
								<label for="signup-email" class="text-sm font-medium text-phase-title">이메일</label>
								<div class="field-ring rounded-2xl border border-white/10 bg-white/[0.03]">
									<input
										id="signup-email"
										name="email"
										type="email"
										autocomplete="email"
										class="w-full rounded-2xl bg-transparent px-4 py-3.5 text-sm text-phase-title placeholder:text-phase-soft focus:outline-none"
										placeholder="you@example.com"
										aria-describedby="signup-email-hint"
										required
									/>
								</div>
									<p id="signup-email-hint" class="auth-field-note text-xs text-phase-soft">로그인에 사용할 이메일 주소입니다.</p>
							</div>

							<div class="space-y-2">
								<label for="signup-password" class="text-sm font-medium text-phase-title">비밀번호</label>
								<div class="field-ring rounded-2xl border border-white/10 bg-white/[0.03]">
									<input
										id="signup-password"
										name="password"
										type="password"
										autocomplete="new-password"
										class="w-full rounded-2xl bg-transparent px-4 py-3.5 text-sm text-phase-title placeholder:text-phase-soft focus:outline-none"
										placeholder="영문과 숫자를 포함한 8자 이상"
										aria-describedby="signup-password-hint"
										required
									/>
								</div>
									<p id="signup-password-hint" class="auth-field-note text-xs text-phase-soft">보안을 위해 8자 이상, 영문과 숫자를 함께 사용하세요.</p>
							</div>

							<div class="space-y-2">
								<label for="signup-confirm-password" class="text-sm font-medium text-phase-title">비밀번호 확인</label>
								<div class="field-ring rounded-2xl border border-white/10 bg-white/[0.03]">
									<input
										id="signup-confirm-password"
										name="confirmPassword"
										type="password"
										autocomplete="new-password"
										class="w-full rounded-2xl bg-transparent px-4 py-3.5 text-sm text-phase-title placeholder:text-phase-soft focus:outline-none"
										placeholder="비밀번호를 한 번 더 입력하세요"
										required
									/>
								</div>
									<p class="auth-field-note auth-spacer text-xs text-phase-soft" aria-hidden="true">.</p>
							</div>
								</div>

							<div class="auth-actions space-y-4">
								<button type="submit" class="w-full rounded-2xl border border-white/15 bg-white/90 px-4 py-3.5 text-sm font-semibold text-black transition duration-300 hover:-translate-y-0.5 hover:bg-white focus:outline-none focus-visible:ring-4 focus-visible:ring-white/20">
									회원가입
								</button>

								<p class="text-center text-sm text-phase-sub">
									이미 계정이 있나요?
									<a href="#signin" class="font-semibold text-phase-title transition hover:text-white focus:outline-none" data-switch="signin">로그인으로 이동</a>
								</p>
							</div>
				</form>
			</div>
		</main>
	</div>

	<script>
		const githubAuthConfigKey = 'phase-github-auth-config';
		const githubAuthConfigDefaults = {
			clientId: '',
			redirectUri: '',
			scope: 'read:user user:email'
		};

		const copy = {
			signin: {
				title: '로그인',
				subtitle: '이메일 또는 GitHub 계정으로 계속하세요.',
				githubLabel: 'GitHub로 로그인'
			},
			signup: {
				title: '회원가입',
				subtitle: '이메일로 가입하거나 GitHub 계정을 연결하세요.',
				githubLabel: 'GitHub로 회원가입'
			}
		};

		const panels = {
			signin: document.getElementById('signin-panel'),
			signup: document.getElementById('signup-panel')
		};

		const tabs = {
			signin: document.getElementById('signin-tab'),
			signup: document.getElementById('signup-tab')
		};

		const feedback = document.getElementById('form-feedback');
		const formTitle = document.getElementById('form-title');
		const formSubtitle = document.getElementById('form-subtitle');
		const githubButton = document.getElementById('github-auth-button');
		const githubButtonLabel = document.getElementById('github-button-label');
		const urlParams = new URLSearchParams(window.location.search);
		let feedbackTimer;

		function loadGitHubAuthConfig() {
			let savedConfig = {};

			try {
				savedConfig = JSON.parse(localStorage.getItem(githubAuthConfigKey) || '{}');
			} catch (error) {
				savedConfig = {};
			}

			return {
				clientId: urlParams.get('githubClientId') || savedConfig.clientId || githubAuthConfigDefaults.clientId,
				redirectUri: urlParams.get('githubRedirectUri') || savedConfig.redirectUri || githubAuthConfigDefaults.redirectUri,
				scope: urlParams.get('githubScope') || savedConfig.scope || githubAuthConfigDefaults.scope
			};
		}

		const githubAuthConfig = loadGitHubAuthConfig();

		function setFeedback(message, type) {
			window.clearTimeout(feedbackTimer);

			if (!message) {
				feedback.textContent = '';
				feedback.className = 'feedback-toast rounded-2xl border px-4 py-3 text-sm leading-6 shadow-phase backdrop-blur-xl';
				return;
			}

			const baseClass = 'feedback-toast is-visible rounded-2xl border px-4 py-3 text-sm leading-6 shadow-phase backdrop-blur-xl';
			const toneClass = type === 'error'
				? ' border-red-400/30 bg-red-500/10 text-red-200'
				: ' border-emerald-400/30 bg-emerald-500/10 text-emerald-200';

			feedback.textContent = message;
			feedback.className = baseClass + toneClass;
			feedbackTimer = window.setTimeout(() => {
				setFeedback('', type);
			}, 4200);
		}

		function showPanel(target, shouldFocus = false) {
			Object.entries(panels).forEach(([name, panel]) => {
				const active = name === target;
				panel.classList.toggle('hidden-panel', !active);
				panel.setAttribute('aria-hidden', String(!active));
			});

			Object.entries(tabs).forEach(([name, tab]) => {
				const active = name === target;
				tab.setAttribute('aria-selected', String(active));
				tab.className = active
					? 'auth-tab flex-1 rounded-xl bg-white px-4 py-3 text-sm font-semibold text-black shadow-sm transition duration-200'
					: 'auth-tab flex-1 rounded-xl px-4 py-3 text-sm font-semibold text-phase-sub transition duration-200 hover:text-phase-title';
			});

			formTitle.textContent = copy[target].title;
			formSubtitle.textContent = copy[target].subtitle;
			githubButtonLabel.textContent = copy[target].githubLabel;
			setFeedback('', 'error');
			window.location.hash = target;

			if (shouldFocus) {
				const firstInput = panels[target].querySelector('input');
				if (firstInput) {
					firstInput.focus();
				}
			}
		}

		function isValidEmail(value) {
			return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
		}

		function isStrongPassword(value) {
			return /^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(value);
		}

		function getSigninError(formData) {
			if (!formData.email || !formData.password) {
				return '이메일과 비밀번호를 모두 입력해주세요.';
			}

			if (!isValidEmail(formData.email)) {
				return '올바른 이메일 형식을 입력해주세요.';
			}

			return '';
		}

		function getSignupError(formData) {
			if (!formData.email || !formData.password || !formData.confirmPassword) {
				return '모든 필드를 입력해주세요.';
			}

			if (!isValidEmail(formData.email)) {
				return '올바른 이메일 형식을 입력해주세요.';
			}

			if (!isStrongPassword(formData.password)) {
				return '비밀번호는 영문과 숫자를 포함한 8자 이상이어야 합니다.';
			}

			if (formData.password !== formData.confirmPassword) {
				return '비밀번호와 비밀번호 확인이 일치하지 않습니다.';
			}

			return '';
		}

		function serializeForm(form) {
			return Object.fromEntries(new FormData(form).entries());
		}

		function saveGitHubAuthConfig(config) {
			localStorage.setItem(githubAuthConfigKey, JSON.stringify(config));
		}

		function requestGitHubAuthConfig() {
			const clientId = window.prompt('GitHub OAuth App Client ID를 입력하세요.', githubAuthConfig.clientId);

			if (!clientId) {
				return false;
			}

			const redirectUri = window.prompt('GitHub OAuth Redirect URI를 입력하세요.', githubAuthConfig.redirectUri || window.location.href.split('?')[0].split('#')[0]);

			if (!redirectUri) {
				return false;
			}

			githubAuthConfig.clientId = clientId.trim();
			githubAuthConfig.redirectUri = redirectUri.trim();
			saveGitHubAuthConfig(githubAuthConfig);
			return true;
		}

		function getGitHubAuthUrl(mode) {
			if (!githubAuthConfig.clientId || !githubAuthConfig.redirectUri) {
				return '';
			}

			const params = new URLSearchParams({
				client_id: githubAuthConfig.clientId,
				redirect_uri: githubAuthConfig.redirectUri,
				scope: githubAuthConfig.scope,
				state: mode
			});

			return 'https://github.com/login/oauth/authorize?' + params.toString();
		}

		tabs.signin.addEventListener('click', () => showPanel('signin', true));
		tabs.signup.addEventListener('click', () => showPanel('signup', true));

		githubButton.addEventListener('click', () => {
			const currentMode = window.location.hash === '#signup' ? 'signup' : 'signin';

			if ((!githubAuthConfig.clientId || !githubAuthConfig.redirectUri) && !requestGitHubAuthConfig()) {
				setFeedback('GitHub 연결을 취소했습니다. Client ID와 Redirect URI가 필요합니다.', 'error');
				return;
			}

			const authUrl = getGitHubAuthUrl(currentMode);

			if (!authUrl) {
				setFeedback('GitHub OAuth 설정이 올바르지 않습니다. Client ID와 Redirect URI를 다시 확인해주세요.', 'error');
				return;
			}

			window.location.href = authUrl;
		});

		document.querySelectorAll('[data-switch]').forEach((link) => {
			link.addEventListener('click', (event) => {
				event.preventDefault();
				showPanel(link.dataset.switch, true);
			});
		});

		panels.signin.addEventListener('submit', (event) => {
			event.preventDefault();
			const data = serializeForm(panels.signin);
			const errorMessage = getSigninError(data);

			if (errorMessage) {
				setFeedback(errorMessage, 'error');
				return;
			}

			setFeedback('입력값이 확인되었습니다. 서버 연동 시 실제 로그인 요청을 연결하면 됩니다.', 'success');
		});

		panels.signup.addEventListener('submit', (event) => {
			event.preventDefault();
			const data = serializeForm(panels.signup);
			const errorMessage = getSignupError(data);

			if (errorMessage) {
				setFeedback(errorMessage, 'error');
				return;
			}

			setFeedback('회원가입 정보가 유효합니다. 서버 연동 시 계정 생성 요청을 연결하면 됩니다.', 'success');
		});

		const initialPanel = window.location.hash === '#signup' ? 'signup' : 'signin';
		showPanel(initialPanel);

		window.addEventListener('hashchange', () => {
			const target = window.location.hash === '#signup' ? 'signup' : 'signin';
			showPanel(target);
		});
	</script>
</body>
</html>
