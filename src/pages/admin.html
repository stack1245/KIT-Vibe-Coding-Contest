<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase Vuln Coach 관리자</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <main class="dashboard-shell">
    <header class="dashboard-head">
      <a class="dashboard-home" href="/">Phase Vuln Coach</a>
      <div class="dashboard-links">
        <a href="/dashboard">대시보드</a>
        <a href="/analysis">파일 분석</a>
      </div>
    </header>

    <section class="dashboard-card">
      <p class="dashboard-eyebrow">Admin Console</p>
      <h1>회원정보 관리</h1>
      <p class="dashboard-subtext">가입한 회원 목록을 확인하고 필요한 경우 계정을 삭제할 수 있습니다.</p>

      <div class="dashboard-grid single">
        <article class="dashboard-panel">
          <div class="dashboard-actions admin-toolbar">
            <strong id="admin-user-count">회원 0명</strong>
            <button id="admin-refresh-button" class="dashboard-button secondary" type="button">새로고침</button>
          </div>
          <p id="admin-feedback" class="dashboard-panel-text"></p>
          <div id="admin-user-list" class="admin-user-list"></div>
        </article>
      </div>
    </section>
  </main>

  <script src="assets/js/admin.js" defer></script>
</body>
</html>
