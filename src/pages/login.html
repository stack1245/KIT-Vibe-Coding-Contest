<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase Vuln Coach 로그인</title>
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div id="form-feedback" class="feedback-toast" aria-live="polite"></div>

  <div class="auth-shell">
    <div class="grid-overlay" aria-hidden="true"></div>

    <main class="auth-card">
      <header class="auth-head">
        <a class="brand-link" href="/" aria-label="메인 페이지로 이동">
          <span class="brand-mark">P</span>
          <span>PHASE VULN COACH</span>
        </a>

        <div class="tab-list" id="auth-tabs" role="tablist" aria-label="인증 화면 전환">
          <button class="auth-tab is-active" id="signin-tab" type="button" role="tab" aria-controls="signin-panel" aria-selected="true">로그인</button>
          <button class="auth-tab" id="signup-tab" type="button" role="tab" aria-controls="signup-panel" aria-selected="false">회원가입</button>
        </div>
      </header>

      <section class="oauth-area" aria-label="간편 로그인">
        <button id="github-auth-button" class="github-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.27-.01-1.18-.02-2.14-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.67 1.24 3.32.95.1-.74.4-1.24.72-1.52-2.56-.29-5.26-1.28-5.26-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.86 10.86 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.59.23 2.77.11 3.06.73.81 1.18 1.84 1.18 3.1 0 4.42-2.7 5.39-5.28 5.68.41.35.78 1.04.78 2.11 0 1.52-.01 2.75-.01 3.12 0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"></path>
          </svg>
          <span id="github-button-label">GitHub로 로그인</span>
        </button>

        <p class="auth-status" id="github-auth-status"></p>
      </section>

      <form class="auth-panel is-active" id="signin-panel" novalidate>
        <div class="fields">
          <div class="field">
            <label for="signin-email">이메일</label>
            <input id="signin-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label for="signin-password">비밀번호</label>
            <input id="signin-password" name="password" type="password" autocomplete="current-password" placeholder="8자 이상 비밀번호" required>
          </div>
        </div>

        <div class="form-footer">
          <button class="submit-button" type="submit">로그인</button>
          <p>아직 계정이 없나요? <a href="#signup" data-switch="signup">회원가입으로 이동</a></p>
        </div>
      </form>

      <form class="auth-panel" id="signup-panel" novalidate aria-hidden="true">
        <div class="fields">
          <div class="field">
            <label for="signup-email">이메일</label>
            <div class="inline-field">
              <input id="signup-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
              <button id="signup-send-code" class="inline-action-button" type="button">인증 요청</button>
            </div>
          </div>

          <div class="field">
            <label for="signup-password">비밀번호</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" placeholder="영문과 숫자를 포함한 8자 이상" required>
          </div>

          <div class="field">
            <label for="signup-confirm-password">비밀번호 확인</label>
            <input id="signup-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" placeholder="비밀번호를 한 번 더 입력하세요" required>
          </div>
        </div>

        <div class="form-footer">
          <button class="submit-button" type="submit">회원가입</button>
          <p>이미 계정이 있나요? <a href="#signin" data-switch="signin">로그인으로 이동</a></p>
        </div>
      </form>
    </main>
  </div>

  <div class="verification-modal" id="verification-modal" hidden>
    <div class="verification-backdrop"></div>
    <div class="verification-dialog" role="dialog" aria-modal="true" aria-labelledby="verification-title">
      <h2 id="verification-title">이메일 인증</h2>
      <input id="verification-modal-code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6자리 인증 코드">
      <button id="verification-confirm-button" class="submit-button" type="button">확인</button>
    </div>
  </div>

  <script src="assets/js/login.js" defer></script>
</body>
</html>
